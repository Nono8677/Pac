<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACHECOIN Pro - Analyseur Manuel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <button onclick="showPage('analyse')">Analyse</button>
        <button onclick="showPage('historique')">Historique</button>
        <button onclick="showPage('graphique')">Graphique</button>
    </nav>

    <main id="content">
        <!-- Section Analyse -->
        <section id="analyse" class="page">
            <h2>Signaux du Tribunal (Daily/H4)</h2>
            <div id="crypto-container">
                <!-- Les cartes crypto s'afficheront ici -->
            </div>
        </section>

        <!-- Section Historique / Saisie -->
        <section id="historique" class="page" style="display:none;">
            <h2>Saisie Manuelle des Trades</h2>
            <div class="trade-form">
                <input type="text" id="symbol" placeholder="Ex: SOL">
                <input type="number" id="entryPrice" placeholder="Prix d'entrée">
                <input type="number" id="levier" placeholder="Levier (ex: 10)">
                <button onclick="saveTrade()">Enregistrer le Trade</button>
            </div>
            <div id="trade-list"></div>
        </section>

        <!-- Section Graphique -->
        <section id="graphique" class="page" style="display:none;">
            <h2>Performance (Base 1000$)</h2>
            <canvas id="perfChart"></canvas>
        </section>
    </main>

    <footer>
        <p><strong>AVERTISSEMENT :</strong> Ce site est un outil d'analyse personnel. Le trading comporte des risques. Ceci n'est pas un conseil en investissement.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
