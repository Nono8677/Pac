<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PACHECOIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PACHECOIN</h1>
        <p id="last-update">Initialisation...</p>
    </header>

    <nav class="tabs">
        <button class="nav-tab active" data-tab="tab-signals">📊 Signaux</button>
        <button class="nav-tab" data-tab="tab-portfolio">💼 Portfolio</button>
    </nav>

    <main>
        <section id="tab-signals" class="tab-content active">
            <div class="controls">
                <button id="refresh-btn">↻</button>
                <select id="signal-tf-select"></select>
            </div>
            <!-- C'est ici que le JS va injecter les cartes -->
            <div id="signals-container"></div>
        </section>

        <section id="tab-portfolio" class="tab-content">
            <div id="portfolio-container"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
