<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PACHECOIN V12.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff9500; --green: #00ff88; --red: #ff4466; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); font-family: 'Space Mono', monospace; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 2px solid var(--accent); margin-bottom: 15px; width: 100%; }
        .logo { font-size: 2.8rem; font-weight: 700; letter-spacing: -3px; }
        #timer { font-size: 0.85rem; color: #fff; margin-top: 5px; display: block; font-weight: bold; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #111; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #555; font-family: 'Space Mono'; font-weight: 700; border-radius: 8px; font-size: 0.65rem; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .page { display: none; width: 100%; }
        .page.active { display: block; }
        .card { background: #0d0d0d; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .val { color: var(--green); font-size: 1.5rem; font-weight: 700; }
        .signal-box { text-align: center; padding: 25px 0; border: 1px solid var(--border); background: #050505; border-radius: 15px; margin-bottom: 15px; }
        #sig { font-size: 4.5rem; font-weight: 700; line-height: 1; margin-bottom: 5px; }
        #lastPriceInfo { font-size: 0.7rem; color: #666; margin-top: 10px; }
        .btn-gen { width: 100%; background: var(--accent); color: #000; border: none; padding: 22px; border-radius: 15px; font-weight: 700; font-family: 'Space Mono'; font-size: 0.9rem; cursor: pointer; }
        .h-row { padding: 15px 10px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; }
        select { flex: 1; background: #111; color: var(--accent); border: 1px solid #222; padding: 12px; border-radius: 10px; font-family: 'Space Mono'; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">PACHECOIN</div>
        <span id="timer">SYNCHRO...</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('main', this)">ANALYSE</button>
        <button class="tab-btn" onclick="switchTab('history', this)">HISTORIQUE</button>
    </div>

    <div id="main" class="page active">
        <div class="card">
            <div style="font-size:0.7rem; color:#aaa; margin-bottom:5px;">Performance <span id="txtAsset">BTC</span> / <span id="txtTF">H4</span></div>
            <div class="val" id="perfDisplay">$1,000.00 (0.00%)</div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="asset" onchange="initApp()">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="SOLUSDT">SOL / USDT</option>
                <option value="BNBUSDT">BNB / USDT</option>
            </select>
            <select id="tf" onchange="initApp()">
                <option value="4h">H4</option>
                <option value="1d">DAILY</option>
            </select>
        </div>

        <div class="signal-box">
            <div id="sig" style="color:#111">WAIT</div>
            <div id="price" style="color:#fff; font-size: 1.4rem; font-weight:bold;">$0.00</div>
            <div id="lastPriceInfo">PRIX D'ENTRÉE : --</div>
        </div>

        <button class="btn-gen" onclick="runLogic()">ACTUALISER SIGNAL</button>
    </div>

    <div id="history" class="page">
        <div class="card" style="padding:0; background:#080808;">
            <div id="histTitle" style="padding:15px; font-size:0.7rem; color:var(--accent); font-weight:bold; border-bottom:1px solid #111">JOURNAL</div>
            <div id="hList"></div>
        </div>
    </div>
</div>

<script>
    const forceData = {
        "BTCUSDT_4h": { cap: 1045.20, trades: [{d:"30/04",t:"08:00",in:"62850",out:"64120",g:2.02}], lastEntry: 62850 },
        "ETHUSDT_4h": { cap: 1032.10, trades: [{d:"30/04",t:"12:00",in:"3120",out:"3220",g:3.21}], lastEntry: 3120 },
        "SOLUSDT_4h": { cap: 1085.40, trades: [{d:"30/04",t:"04:00",in:"128.5",out:"139.4",g:8.48}], lastEntry: 128.5 },
        "BNBUSDT_4h": { cap: 1025.60, trades: [{d:"30/04",t:"10:00",in:"585.2",out:"600.2",g:2.56}], lastEntry: 585.2 }
    };

    let state = JSON.parse(localStorage.getItem('pache_v12_1')) || forceData;

    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        updateUI();
    }

    function initApp() {
        const asset = document.getElementById('asset').value;
        const tf = document.getElementById('tf').value;
        const key = `${asset}_${tf}`;
        if (!state[key]) state[key] = { cap: 1000, trades: [], currentTrade: null, lastEntry: null };
        document.getElementById('txtAsset').innerText = asset.replace('USDT','');
        document.getElementById('txtTF').innerText = tf.toUpperCase();
        document.getElementById('histTitle').innerText = `JOURNAL [${asset.replace('USDT','')} / ${tf.toUpperCase()}]`;
        updateUI();
    }

    function updateTimer() {
        const now = new Date();
        const tf = document.getElementById('tf').value;
        let target = new Date();
        let hoursUTC = now.getUTCHours();
        let interval = (tf === '4h') ? 4 : 24;
        let nextCloture = Math.ceil((hoursUTC + 0.001) / interval) * interval;
        target.setUTCHours(nextCloture, 0, 0, 0);
        const diff = target - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `CLÔTURE DANS : ${h}:${m}:${s}`;
    }

    async function runLogic() {
        const asset = document.getElementById('asset').value;
        const tf = document.getElementById('tf').value;
        const key = `${asset}_${tf}`;
        
        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${asset}&interval=${tf}&limit=50`);
            const d = await r.json();
            const currentPrice = parseFloat(d[d.length - 1][4]);
            const sma = d.slice(-20).reduce((a, b) => a + parseFloat(b[4]), 0) / 20;
            const signal = currentPrice > sma ? "BUY" : "SELL";

            document.getElementById('sig').innerText = signal;
            document.getElementById('sig').style.color = signal === "BUY" ? "var(--green)" : "var(--red)";
            document.getElementById('price').innerText = "$" + currentPrice.toLocaleString();

            if (!state[key].currentTrade && signal === "BUY") {
                state[key].currentTrade = { in: currentPrice, d: new Date().toLocaleDateString('fr-FR') };
                state[key].lastEntry = currentPrice;
            } else if (state[key].currentTrade && signal === "SELL") {
                const entry = state[key].currentTrade.in;
                const gain = (((currentPrice - entry) / entry) * 100).toFixed(2);
                state[key].trades.push({
                    d: state[key].currentTrade.d,
                    t: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                    in: entry.toFixed(2),
                    out: currentPrice.toFixed(2),
                    g: parseFloat(gain)
                });
                state[key].cap *= (1 + (gain/100));
                state[key].currentTrade = null;
            }
            localStorage.setItem('pache_v12_1', JSON.stringify(state));
            updateUI();
        } catch(e) { console.error(e); }
    }

    function updateUI() {
        const key = `${document.getElementById('asset').value}_${document.getElementById('tf').value}`;
        const data = state[key];
        const p = ((data.cap - 1000) / 1000 * 100).toFixed(2);
        
        document.getElementById('perfDisplay').innerText = `$${data.cap.toLocaleString(undefined,{minimumFractionDigits:2})} (${p > 0 ? '+':''}${p}%)`;
        document.getElementById('perfDisplay').style.color = p >= 0 ? 'var(--green)' : 'var(--red)';
        
        const lastEntry = data.currentTrade ? data.currentTrade.in : (data.lastEntry || "--");
        document.getElementById('lastPriceInfo').innerText = data.currentTrade ? `PRIX D'ACHAT : $${lastEntry.toLocaleString()}` : `DERNIER PRIX D'ENTRÉE : $${lastEntry.toLocaleString()}`;

        const list = document.getElementById('hList');
        list.innerHTML = data.trades.length === 0 ? '<div style="padding:30px; text-align:center; color:#333">Aucun trade</div>' : '';
        data.trades.slice().reverse().forEach(t => {
            list.innerHTML += `<div class="h-row"><div>${t.d} ${t.t}<br>IN: ${t.in} / OUT: ${t.out}</div><div style="font-weight:bold; color:${t.g >= 0 ? 'var(--green)' : 'var(--red)'}">${t.g}%</div></div>`;
        });
    }

    setInterval(updateTimer, 1000);
    initApp();
</script>
</body>
</html>
