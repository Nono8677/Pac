<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pachecoin Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #ff9500;
            --green: #00ff88;
            --red: #ff4466;
            --card: #0d0d0d;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 400px; }

        /* HEADER AVEC PACHECOIN XXL */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .pachecoin-logo { 
            font-family: 'Space Mono', monospace; 
            font-size: 2.8rem; /* TAILLE MAXIMUM */
            font-weight: 700; 
            letter-spacing: -2px; 
            line-height: 1;
            margin-bottom: 10px;
        }
        .timer-display { 
            display: inline-block;
            background: #111; 
            color: var(--green); 
            font-family: 'Space Mono'; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-size: 0.9rem;
            border: 1px solid #222;
        }

        /* PERF CARD */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .val { color: #fff; font-family: 'Space Mono'; font-size: 1.2rem; font-weight: 700; }

        /* MAIN SIGNAL */
        .signal-box { text-align: center; padding: 30px 10px; }
        #sigText { font-family: 'Space Mono'; font-size: 5.5rem; font-weight: 700; line-height: 1; }
        .price { color: #fff; font-size: 1.8rem; font-family: 'Space Mono'; margin: 15px 0; }

        /* BUTTON */
        .btn { 
            width: 100%; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 22px; 
            border-radius: 15px; 
            font-weight: 700; 
            font-family: 'Space Mono'; 
            font-size: 1.1rem; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.2);
        }

        /* HISTORIQUE */
        .history { margin-top: 25px; width: 100%; }
        .history-title { font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; color: #444; display: flex; justify-content: space-between; }
        .h-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            padding: 12px 0; 
            border-bottom: 1px solid #111; 
            font-size: 0.7rem; 
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="pachecoin-logo">PACHECOIN</div>
        <div class="timer-display" id="timer">CLÔTURE: 00:00:00</div>
    </div>

    <div class="card">
        <div class="label">PERFORMANCE PORTFOLIO (1000$)</div>
        <div class="val" id="perfDisplay">$1,000.00 (0.00%)</div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <select id="asset" style="flex:1; background:#111; color:var(--accent); border:1px solid #222; padding:12px; border-radius:10px; font-family:'Space Mono';">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
        </select>
        <select id="tf" onchange="updateTimer()" style="flex:1; background:#111; color:var(--accent); border:1px solid #222; padding:12px; border-radius:10px; font-family:'Space Mono';">
            <option value="4h">4H SWING</option>
            <option value="1d">1D TENDANCE</option>
        </select>
    </div>

    <div class="card signal-box">
        <div id="sigText" style="color:#222">---</div>
        <div class="price" id="curPrice">$0.00</div>
        <div style="background:rgba(255,149,0,0.05); padding:10px; border-radius:8px; font-size:0.8rem;">
            ENTRY: <span id="entryPrice" style="color:#fff">---</span>
        </div>
    </div>

    <button class="btn" onclick="getSignal()">GÉNÉRER SIGNAL FUSIONNÉ</button>

    <div class="history">
        <div class="history-title"><span>HISTORIQUE DES TRADES</span> <span id="count">0</span></div>
        <div class="h-row" style="color:#444; font-weight:bold; border-bottom:1px solid #222">
            <div>DATE</div>
            <div>ACTION</div>
            <div style="text-align:right">PROFIT</div>
        </div>
        <div id="hList"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('pache_db')) || { cap: 1000, lastP: 0, lastS: null, trades: [] };

    // COMPTE À REBOURS
    function updateTimer() {
        const now = new Date();
        const timeframe = document.getElementById('tf').value;
        let target = new Date();
        if(timeframe === '4h') {
            target.setUTCHours((Math.floor(now.getUTCHours() / 4) + 1) * 4, 0, 0, 0);
        } else {
            target.setUTCHours(24, 0, 0, 0);
        }
        const diff = target - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `CLÔTURE: ${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000);

    function refreshUI() {
        const perc = ((db.cap - 1000) / 1000 * 100).toFixed(2);
        document.getElementById('perfDisplay').innerText = `$${db.cap.toLocaleString(undefined,{minimumFractionDigits:2})} (${perc > 0 ? '+':''}${perc}%)`;
        document.getElementById('perfDisplay').style.color = perc >= 0 ? 'var(--green)' : 'var(--red)';
        
        const list = document.getElementById('hList');
        list.innerHTML = '';
        db.trades.slice().reverse().forEach(t => {
            list.innerHTML += `<div class="h-row"><div>${t.d}</div><div>${t.type} @ ${t.p}</div><div style="text-align:right; color:${t.gain >= 0 ? 'var(--green)':'var(--red)'}">${t.gain > 0 ? '+':''}${t.gain.toFixed(2)}%</div></div>`;
        });
        document.getElementById('count').innerText = db.trades.length;
    }

    async function getSignal() {
        const symbol = document.getElementById('asset').value;
        const timeframe = document.getElementById('tf').value;
        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${timeframe}&limit=2`);
            const data = await r.json();
            const p = parseFloat(data[1][4]);
            
            // Simulation signal (on pourra affiner la logique Fusion plus tard)
            const s = Math.random() > 0.5 ? "BUY" : "SELL";
            
            document.getElementById('sigText').innerText = s;
            document.getElementById('sigText').style.color = s === "BUY" ? "var(--green)" : "var(--red)";
            document.getElementById('curPrice').innerText = "$" + p.toLocaleString();
            document.getElementById('entryPrice').innerText = "$" + (p * 0.998).toFixed(2);

            if(db.lastS && db.lastS !== s) {
                const gain = ((p - db.lastP) / db.lastP) * 100;
                db.trades.push({ d: new Date().toLocaleDateString(), type: s === 'SELL' ? 'EXIT' : 'ENTRY', p: p.toFixed(2), gain: gain });
                db.cap *= (1 + (gain/100));
            }
            db.lastP = p; db.lastS = s;
            localStorage.setItem('pache_db', JSON.stringify(db));
            refreshUI();
        } catch(e) { alert("Erreur de connexion"); }
    }

    refreshUI();
</script>
</body>
</html>
