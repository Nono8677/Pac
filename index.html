<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>PACHECOIN — Tribunal des 3</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
</head>
<body>
<div id="app">
  <header class="header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="logo">PACHE<span>COIN</span></div>
      <div id="countdown" style="font-size: 0.8rem; color: #f0a500; font-weight: bold; text-align: right; font-family: monospace;"></div>
    </div>
    <div id="last-update" style="font-size: 0.7rem; opacity: 0.5; text-align: right; margin-top: 4px;">Chargement…</div>
  </header>

  <nav class="nav-tabs">
    <div class="nav-tab active" data-tab="tab-signal">📊 Signaux</div>
    <div class="nav-tab" data-tab="tab-portfolio">💼 Portfolio</div>
  </nav>

  <section id="tab-signal" class="tab-content active">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <button id="refresh-btn" class="refresh-btn">↻</button>
      <select id="signal-tf-select" class="selector"></select>
    </div>
    <div id="signals-container"></div>
  </section>

  <section id="tab-portfolio" class="tab-content">
    <div class="pf-selectors" style="display: flex; gap: 8px; margin-bottom: 15px;">
      <select id="pf-pair-select" class="selector" style="flex:2"></select>
      <select id="pf-tf-select" class="selector" style="flex:1"></select>
      <button id="pf-refresh-btn" class="pf-refresh-btn">↻</button>
    </div>
    <div id="portfolio-container"></div>
  </section>

  <footer class="disclaimer">
    <p><strong>Avertissement :</strong> PACHECOIN est un outil d'aide à l'analyse. Ces signaux ne constituent pas des conseils en investissement. Le trading comporte des risques de perte de capital.</p>
  </footer>
</div>
<script src="/app.js"></script>
</body>
</html>
