<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PACHECOIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; color: #fff; margin: 0; text-align: center;">

    <header style="padding: 20px;">
        <h1 style="color: #f0b90b; font-size: 2.5rem; margin: 0;">PACHECOIN</h1>
        <p id="last-update" style="font-size: 0.8rem; opacity: 0.5;">Analyse en cours...</p>
    </header>

    <nav class="tabs" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
        <button class="nav-tab active" data-tab="tab-signals" style="background: none; border: none; color: #f0b90b; border-bottom: 2px solid #f0b90b; padding: 10px;">📊 Signaux</button>
        <button class="nav-tab" data-tab="tab-portfolio" style="background: none; border: none; color: gray; padding: 10px;">💼 Portfolio</button>
    </nav>

    <main>
        <section id="tab-signals" class="tab-content active">
            <div id="signals-container"></div>
        </section>
        <section id="tab-portfolio" class="tab-content" style="display:none;">
            <div id="portfolio-container"></div>
        </section>
    </main>

    <footer style="margin-top: 40px; padding: 20px;">
        <p style="font-size: 0.7rem; color: #474d57;">Avertissement : PACHECOIN est un outil d'aide à l'analyse. Ces signaux ne constituent pas des conseils en investissement.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
