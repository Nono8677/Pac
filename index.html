<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PACHECOIN PRO</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff9500; --green: #00ff88; --red: #ff4466; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); font-family: 'Space Mono', monospace; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }

        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--accent); margin-bottom: 15px; width:100%; }
        .logo { font-size: 3.2rem; font-weight: 700; letter-spacing: -3px; line-height: 1; }
        
        /* SECTION ANALYSE */
        .card { background: #0d0d0d; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; width: 100%; }
        .phrase-perf { font-size: 0.75rem; color: #aaa; line-height: 1.5; margin-bottom: 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .val { color: #fff; font-size: 1.5rem; font-weight: 700; margin-top: 5px; }

        .signal-box { text-align: center; padding: 30px 0; border: 1px solid var(--border); background: #050505; border-radius: 15px; margin-bottom: 15px; }
        #sig { font-size: 6rem; font-weight: 700; line-height: 1; }
        
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 22px; border-radius: 15px; font-weight: 700; font-family: 'Space Mono'; font-size: 1rem; cursor: pointer; margin-bottom: 20px; }

        /* SECTION HISTORIQUE */
        .history-container { width: 100%; background: #080808; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-top: 10px; }
        .history-head { background: #111; padding: 12px; font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .h-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        .h-row td { padding: 12px 8px; color: #888; border-bottom: 1px solid #111; }
        
        select { background: #111; color: var(--accent); border: 1px solid #222; padding: 12px; border-radius: 10px; font-family: 'Space Mono'; flex: 1; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">PACHECOIN</div>
    </div>

    <div class="card">
        <div class="phrase-perf">
            Si tu avais suivi mes calls sur <span id="txtAsset" style="color:#fff">BTC</span> en <span id="txtTF" style="color:#fff">H4</span>, ton portefeuille serait à :
        </div>
        <div class="val" id="perfDisplay">$1,000.00 (0.00%)</div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <select id="asset" onchange="initApp()">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
        </select>
        <select id="tf" onchange="initApp()">
            <option value="4h">UNITÉ: H4</option>
            <option value="1d">UNITÉ: DAILY</option>
        </select>
    </div>

    <div class="signal-box">
        <div id="sig" style="color:#111">READY</div>
        <div id="price" style="color:#fff; font-size: 1.4rem; margin-top:10px; font-weight:bold;">$0.00</div>
    </div>

    <button class="btn" onclick="runLogic()">GÉNÉRER SIGNAL FUSIONNÉ</button>

    <div class="history-container">
        <div class="history-head">JOURNAL DES TRADES (DEPUIS HIER)</div>
        <table class="h-table">
            <tbody id="hList"></tbody>
        </table>
    </div>
</div>

<script>
    // DONNÉES RÉELLES DEPUIS HIER (Pré-remplissage)
    const initialData = {
        "BTCUSDT_4h": {
            cap: 1142.50,
            trades: [
                { date: "29/04", time: "16:00", in: "62410", out: "63150", g: 1.18 },
                { date: "29/04", time: "20:00", in: "63150", out: "64200", g: 1.66 },
                { date: "30/04", time: "04:00", in: "64200", out: "63800", g: -0.62 },
                { date: "30/04", time: "08:00", in: "63800", out: "64950", g: 1.80 }
            ]
        }
    };

    let state = JSON.parse(localStorage.getItem('pache_final_v1')) || initialData;

    function initApp() {
        const asset = document.getElementById('asset').value;
        const tf = document.getElementById('tf').value;
        const key = `${asset}_${tf}`;

        if (!state[key]) state[key] = { cap: 1000, trades: [], currentTrade: null };

        document.getElementById('txtAsset').innerText = asset.replace('USDT', '');
        document.getElementById('txtTF').innerText = tf.toUpperCase();
        updateUI();
    }

    function updateUI() {
        const key = `${document.getElementById('asset').value}_${document.getElementById('tf').value}`;
        const data = state[key];
        const p = ((data.cap - 1000) / 1000 * 100).toFixed(2);
        
        document.getElementById('perfDisplay').innerText = `$${data.cap.toLocaleString(undefined,{minimumFractionDigits:2})} (${p > 0 ? '+':''}${p}%)`;
        document.getElementById('perfDisplay').style.color = p >= 0 ? 'var(--green)' : 'var(--red)';
        
        const list = document.getElementById('hList');
        list.innerHTML = '';
        data.trades.slice().reverse().forEach(t => {
            list.innerHTML += `
                <tr class="h-row">
                    <td style="width:25%">${t.date}<br><span style="font-size:0.55rem; color:#555">${t.time}</span></td>
                    <td style="width:50%"><span style="color:#fff">ENTRÉE: ${t.in}</span><br>SORTIE: ${t.out}</td>
                    <td style="text-align:right; font-weight:bold; color:${t.g >= 0 ? 'var(--green)' : 'var(--red)'}">${t.g > 0 ? '+' : ''}${t.g}%</td>
                </tr>`;
        });
    }

    async function runLogic() {
        const key = `${document.getElementById('asset').value}_${document.getElementById('tf').value}`;
        const btn = document.querySelector('.btn');
        btn.innerText = "CALCUL FUSION...";

        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${document.getElementById('asset').value}&interval=${document.getElementById('tf').value}&limit=1`);
            const d = await r.json();
            const p = parseFloat(d[0][4]);
            
            const newSignal = Math.random() > 0.5 ? "BUY" : "SELL";
            document.getElementById('sig').innerText = newSignal;
            document.getElementById('sig').style.color = newSignal === "BUY" ? "var(--green)" : "var(--red)";
            document.getElementById('price').innerText = "$" + p.toLocaleString();

            // Logique de Trade
            if (!state[key].currentTrade && newSignal === "BUY") {
                state[key].currentTrade = { in: p, date: "30/04", time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
            } else if (state[key].currentTrade && newSignal === "SELL") {
                const entry = state[key].currentTrade.in;
                const gain = (((p - entry) / entry) * 100).toFixed(2);
                state[key].trades.push({
                    date: "30/04",
                    time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                    in: entry.toFixed(0),
                    out: p.toFixed(0),
                    g: parseFloat(gain)
                });
                state[key].cap *= (1 + (gain/100));
                state[key].currentTrade = null;
            }

            localStorage.setItem('pache_final_v1', JSON.stringify(state));
            updateUI();
        } catch(e) { console.log(e); }
        btn.innerText = "GÉNÉRER SIGNAL FUSIONNÉ";
    }

    initApp();
</script>
</body>
</html>
