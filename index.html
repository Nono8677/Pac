<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACHECOIN - Analyse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PACHECOIN</h1>
        <p id="last-update">Initialisation...</p>
        <p id="countdown" style="font-size: 0.8rem; opacity: 0.7;"></p>
    </header>

    <nav class="tabs">
        <button class="nav-tab active" data-tab="tab-signals">📊 Signaux</button>
        <button class="nav-tab" data-tab="tab-portfolio">💼 Portfolio</button>
    </nav>

    <main>
        <!-- Onglet Signaux -->
        <section id="tab-signals" class="tab-content active">
            <div class="controls">
                <select id="signal-tf-select"></select>
                <button id="refresh-btn">↻ Rafraîchir</button>
            </div>
            <div id="signals-container">
                <!-- Les cartes crypto s'afficheront ici -->
            </div>
        </section>

        <!-- Onglet Portfolio (Ta progression préservée) -->
        <section id="tab-portfolio" class="tab-content">
            <div id="portfolio-container">
                <!-- Le calcul du capital s'affichera ici -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
