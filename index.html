<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pachecoin - CryptoSignal Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent-orange: #ff9500;
            --accent-red: #ff4466;
            --accent-green: #00ff88;
            --text-main: #ff9500;
            --text-white: #ffffff;
            --text-dim: #444444;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 10px 5px; border-bottom: 1px solid var(--border); }
        .pachecoin { color: var(--accent-orange); font-weight: 700; font-family: 'Space Mono'; font-size: 0.8rem; letter-spacing: 1px; }
        
        .timer-box { font-size: 0.7rem; color: var(--text-white); background: #111; padding: 4px 10px; border-radius: 4px; font-family: 'Space Mono'; border: 1px solid var(--border); }

        .wallet-card { 
            background: #0d0d0d; border: 1px solid var(--border); border-left: 4px solid var(--accent-orange);
            border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .wallet-val { color: var(--text-white); font-family: 'Space Mono'; font-size: 1rem; font-weight: 700; }

        .main-card { 
            background: var(--card-bg); border-radius: 24px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 15px; 
        }
        #mainSignal { font-family: 'Space Mono'; font-size: 5rem; font-weight: 700; line-height: 1; margin-bottom: 10px; }
        
        .history-section { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 15px; margin-top: 15px; }
        .history-title { font-size: 0.7rem; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; color: var(--text-dim); display: flex; justify-content: space-between; }
        .trade-row { font-size: 0.65rem; border-bottom: 1px solid #111; padding: 8px 0; display: grid; grid-template-columns: 1fr 1fr 1fr; color: #ccc; }
        .trade-header { color: var(--text-dim); font-weight: 700; border-bottom: 1px solid var(--border); }

        .btn-analyze { width: 100%; background: var(--accent-orange); color: #000; border: none; padding: 20px; border-radius: 14px; font-weight: 700; font-family: 'Space Mono'; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="pachecoin">PACHECOIN PRO</div>
        <div class="timer-box" id="candleTimer">NEXT: 00:00:00</div>
    </div>

    <div class="wallet-card">
        <div>
            <div style="font-size:0.55rem; color:var(--text-dim)">PF PERFORMANCE (1000$) - <span id="walletAsset">BTC</span></div>
            <div class="wallet-val" id="walletReturn">$1,000.00 (0.00%)</div>
        </div>
        <button onclick="resetAll()" style="background:none; border:1px solid #333; color:#555; font-size:0.5rem; padding:6px; border-radius:6px;">RESET</button>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:15px;">
        <select id="assetSelect" style="flex:1; background:#0d0d0d; color:var(--accent-orange); border:1px solid var(--border); padding:12px; border-radius:10px;" onchange="updateDisplay()">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
        </select>
        <select id="tfSelect" style="flex:1; background:#0d0d0d; color:var(--accent-orange); border:1px solid var(--border); padding:12px; border-radius:10px;" onchange="updateDisplay()">
            <option value="4h">TIMEFRAME: 4H</option>
            <option value="1d">TIMEFRAME: 1D</option>
        </select>
    </div>

    <div class="main-card">
        <div id="mainSignal" style="color:var(--text-dim)">---</div>
        <div id="priceBig" style="font-family:'Space Mono'; font-size:1.6rem; color:#fff; margin-bottom:20px;">$0.00</div>
        <div style="background:rgba(255,149,0,0.03); border:1px solid var(--border); border-radius:12px; padding:15px;">
            <div id="entryLabel" style="font-size:0.6rem; color:var(--accent-orange); margin-bottom:5px;">PRIX D'ENTRÉE CONSEILLÉ</div>
            <div id="valEntry" style="color:#fff; font-family:'Space Mono'; font-size:1.2rem; font-weight:700;">---</div>
        </div>
    </div>

    <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()">GÉNÉRER SIGNAL FUSIONNÉ</button>

    <div class="history-section">
        <div class="history-title"><span>HISTORIQUE DES TRADES</span> <span id="tradeCount" style="color:var(--accent-orange)">0 TRADES</span></div>
        <div class="trade-row trade-header">
            <div>DATE/HEURE</div>
            <div>ENTRY/EXIT</div>
            <div style="text-align:right">PROFIT</div>
        </div>
        <div id="tradeHistory">
            </div>
    </div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('pachecoin_v2_data')) || {
        portfolio: { capital: 1000, lastPrice: 0, lastSignal: null },
        history: []
    };

    function updateTimer() {
        const now = new Date();
        const tf = document.getElementById('tfSelect').value;
        let nextCandle = new Date();

        if(tf === '4h') {
            const hours = now.getUTCHours();
            const nextH = (Math.floor(hours / 4) + 1) * 4;
            nextCandle.setUTCHours(nextH, 0, 0, 0);
        } else {
            nextCandle.setUTCHours(24, 0, 0, 0);
        }

        const diff = nextCandle - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('candleTimer').innerText = `CLÔTURE: ${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000);

    function updateDisplay() {
        const p = appData.portfolio;
        const percent = ((p.capital - 1000) / 1000 * 100).toFixed(2);
        document.getElementById('walletReturn').innerText = `$${p.capital.toLocaleString('en-US', {minimumFractionDigits: 2})} (${percent > 0 ? '+':''}${percent}%)`;
        document.getElementById('walletReturn').style.color = percent >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('tradeHistory');
        container.innerHTML = '';
        document.getElementById('tradeCount').innerText = `${appData.history.length} TRADES`;
        
        [...appData.history].reverse().forEach(t => {
            const row = document.createElement('div');
            row.className = 'trade-row';
            row.innerHTML = `
                <div>${t.date}<br><small>${t.time}</small></div>
                <div>In: ${t.in.toFixed(1)}<br>Out: ${t.out.toFixed(1)}</div>
                <div style="text-align:right; color:${t.p >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${t.p > 0 ? '+':''}${t.p.toFixed(2)}%</div>
            `;
            container.appendChild(row);
        });
    }

    async function runAnalysis() {
        const symbol = document.getElementById('assetSelect').value;
        const tf = document.getElementById('tfSelect').value;
        const btn = document.getElementById('btnAnalyze');
        btn.disabled = true; btn.innerText = "CALCUL EN COURS...";

        try {
            const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=50`);
            const data = await resp.json();
            const currentPrice = parseFloat(data[data.length-1][4]);
            
            // Logique simplifiée du signal pour démo (Score Fusion)
            const signal = Math.random() > 0.5 ? "BUY" : "SELL";
            
            document.getElementById('priceBig').innerText = `$${currentPrice.toLocaleString()}`;
            const sigEl = document.getElementById('mainSignal');
            sigEl.innerText = signal;
            sigEl.style.color = signal === "BUY" ? "var(--accent-green)" : "var(--accent-red)";
            document.getElementById('valEntry').innerText = `$${(currentPrice * 0.998).toLocaleString()}`;

            // Enregistrement historique si le signal change
            if(appData.portfolio.lastSignal && appData.portfolio.lastSignal !== signal) {
                const profit = ((currentPrice - appData.portfolio.lastPrice) / appData.portfolio.lastPrice) * 100;
                const now = new Date();
                appData.history.push({
                    date: now.toLocaleDateString(),
                    time: now.toLocaleTimeString(),
                    in: appData.portfolio.lastPrice,
                    out: currentPrice,
                    p: signal === "SELL" ? profit : -profit // Simplifié
                });
                appData.portfolio.capital *= (1 + (profit/100));
            }

            appData.portfolio.lastPrice = currentPrice;
            appData.portfolio.lastSignal = signal;
            localStorage.setItem('pachecoin_v2_data', JSON.stringify(appData));
            updateDisplay();

        } catch (e) { console.error(e); }
        btn.disabled = false; btn.innerText = "GÉNÉRER SIGNAL FUSIONNÉ";
    }

    function resetAll() {
        if(confirm("Réinitialiser l'historique et le portefeuille ?")) {
            appData = { portfolio: { capital: 1000, lastPrice: 0, lastSignal: null }, history: [] };
            localStorage.setItem('pachecoin_v2_data', JSON.stringify(appData));
            updateDisplay();
        }
    }

    updateDisplay();
</script>
</body>
</html>
